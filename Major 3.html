<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Weather Forecast Portal</h1>
    </header>

    <main>
        <div class="search-section">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loading" class="loading hidden">Loading...</div>
        <div id="error" class="error hidden"></div>

        <div id="weatherCard" class="weather-card hidden">
            <h2 id="cityName"></h2>
            <img id="weatherIcon" src="" alt="Weather Icon">
            <div class="weather-info">
                <p class="temp"><span id="temperature"></span>°C</p>
                <p id="condition"></p>
                <div class="details">
                    <p>Humidity: <span id="humidity"></span>%</p>
                    <p>Wind Speed: <span id="windSpeed"></span> m/s</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>College Address: Government Polytechnic Bhagalpur, Bihar - 812001</p>
        <p>Contact: +91 98765 43210 | Email: weather@portal.com</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
